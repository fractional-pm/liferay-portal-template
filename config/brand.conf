# ═══════════════════════════════════════════════════════════════════════════
# BRAND CONFIGURATION
# Edit this file to customize the portal for your organization.
# Run: ./scripts/build-theme.sh to generate and deploy the theme.
# ═══════════════════════════════════════════════════════════════════════════

# ── Identity ──────────────────────────────────────────────────────────────
BRAND_NAME="Acme Corp"
BRAND_TAGLINE="Enterprise Solutions for the AI Era"
BRAND_DESCRIPTION="We help organizations transform, innovate, and lead through intelligent technology."
BRAND_DOMAIN="acme.com"
BRAND_COPYRIGHT="Acme Corp"

# ── Theme ID (lowercase, no spaces/hyphens — used in WAR naming) ─────────
THEME_ID="acmetheme"
THEME_DISPLAY_NAME="Acme Theme"

# ── Color Palette ─────────────────────────────────────────────────────────
# Primary: Main brand color (header, CTA buttons, headings)
COLOR_PRIMARY="#00395E"
# Primary Light: Links, active states, focus rings
COLOR_PRIMARY_LIGHT="#0072CE"
# Primary Lighter: Hover backgrounds, subtle highlights
COLOR_PRIMARY_LIGHTER="#4DA3E5"
# Primary Lightest: Tinted backgrounds, alert-info bg
COLOR_PRIMARY_LIGHTEST="#E8F4FD"
# Secondary: Footer background, dark UI elements
COLOR_SECONDARY="#1A1A2E"
# Accent: Same as primary-light by default, override for contrast
COLOR_ACCENT="#0072CE"

# ── Neutral Palette ───────────────────────────────────────────────────────
NEUTRAL_100="#F4F4F4"
NEUTRAL_200="#E0E0E0"
NEUTRAL_300="#C6C6C6"
NEUTRAL_400="#A8A8A8"
NEUTRAL_500="#6F6F6F"
NEUTRAL_600="#525252"
NEUTRAL_700="#393939"
NEUTRAL_800="#262626"
NEUTRAL_900="#161616"

# ── Functional Colors ─────────────────────────────────────────────────────
COLOR_SUCCESS="#198038"
COLOR_WARNING="#F1C21B"
COLOR_DANGER="#DA1E28"
COLOR_INFO="#0072CE"

# ── Typography ────────────────────────────────────────────────────────────
# Google Fonts import URL (leave empty for system fonts)
FONT_IMPORT_URL="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
FONT_FAMILY_BASE="'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
FONT_FAMILY_MONO="'IBM Plex Mono', 'SFMono-Regular', monospace"
FONT_SIZE_BASE="0.875rem"

# ── Layout Style ──────────────────────────────────────────────────────────
# Options: "sharp" (border-radius: 0, IBM Carbon style)
#          "soft"  (border-radius: 4px, modern SaaS style)
#          "round" (border-radius: 8px, friendly/consumer style)
LAYOUT_STYLE="sharp"

# Max content width (IBM 2xl=1584px, standard=1280px, wide=1440px)
CONTENT_MAX_WIDTH="1584px"

# Header height
HEADER_HEIGHT="48px"

# ── Footer Columns ────────────────────────────────────────────────────────
# Define footer columns as: "Heading|Link1:URL1|Link2:URL2|..."
# Maximum 6 columns recommended
FOOTER_COL_1="Products|AI Platform:#|Data Engine:#|Cloud Suite:#|Developer Tools:#"
FOOTER_COL_2="Solutions|Digital Transformation:#|Intelligent Automation:#|Enterprise Analytics:#|Hybrid Cloud:#"
FOOTER_COL_3="Industries|Financial Services:#|Healthcare:#|Manufacturing:#|Public Sector:#"
FOOTER_COL_4="Use Cases|Predictive Ops:#|Customer Intelligence:#|Supply Chain:#|Risk & Compliance:#"
FOOTER_COL_5="Who We Serve|Enterprise:#|Mid-Market:#|Partners:#|Developers:#"
FOOTER_COL_6="Company|About Us:#|Leadership:#|Research:#|Contact:#"

# ── Navigation ────────────────────────────────────────────────────────────
# Pages to create: "PageName,/friendly-url,type,widget-portlet-id"
# type: portlet | content
# widget-portlet-id: leave empty for content pages, or specify for widget pages
PAGES="
Home,/home,portlet,com_liferay_journal_content_web_portlet_JournalContentPortlet
Products,/products,portlet,com_liferay_journal_content_web_portlet_JournalContentPortlet
Solutions,/solutions,portlet,com_liferay_journal_content_web_portlet_JournalContentPortlet
Use Cases,/use-cases,portlet,com_liferay_journal_content_web_portlet_JournalContentPortlet
Industries,/industries,portlet,com_liferay_journal_content_web_portlet_JournalContentPortlet
Blog,/blog,portlet,com_liferay_blogs_web_portlet_BlogsPortlet
Knowledge Base,/knowledge-base,portlet,com_liferay_journal_content_web_portlet_JournalContentPortlet
Documents,/documents-library,portlet,com_liferay_document_library_web_portlet_DLPortlet
"

# ── Feature Toggles ──────────────────────────────────────────────────────
SHOW_SEARCH_IN_HEADER="true"
SHOW_LANGUAGE_SELECTOR="false"
SHOW_SOCIAL_LINKS="false"

# Social links (only used if SHOW_SOCIAL_LINKS=true)
SOCIAL_LINKEDIN=""
SOCIAL_TWITTER=""
SOCIAL_GITHUB=""
